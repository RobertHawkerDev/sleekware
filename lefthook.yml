# Validate the commit message syntax
commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}

# Fast checks on every commit
pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{js,ts,jsx,tsx,json,md}"
      run: npx oxfmt --write {staged_files} && git add {staged_files}

    - name: lint
      glob: "*.{js,ts,jsx,tsx}"
      run: npx oxlint {staged_files}

# Full project check right before pushing to GitHub
pre-push:
  jobs:
    - name: typecheck
      run: npm run typecheck
